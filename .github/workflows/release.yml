name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub release'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Collect build info
        id: info
        shell: pwsh
        run: |
          $shaShort = git rev-parse --short HEAD
          "sha_short=$shaShort" >> $env:GITHUB_OUTPUT
          [xml]$props = Get-Content Directory.Build.props
          $version = $props.Project.PropertyGroup.Version
          "version=$version" >> $env:GITHUB_OUTPUT
          "Version found: $version"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Install Cake Tool
        run: dotnet tool restore
      - name: Build with Cake
        run: dotnet cake --target=Build --verbosity=normal
      - name: Create Git Tag (if needed)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: pwsh
        run: |
          $tagName = "v${{ steps.info.outputs.version }}"
          if (git rev-parse $tagName 2>$null) {
            "Tag $tagName already exists"
          } else {
            "Creating tag $tagName"
            git config user.name github-actions
            git config user.email github-actions@github.com
            git tag -a $tagName -m "Release $tagName"
            git push origin $tagName
          }
      - name: Create GitHub Release
        if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true') }}
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          generate_release_notes: false
          name: v${{ steps.info.outputs.version }}
          tag_name: v${{ steps.info.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: |
            ./bin/Release/net472/*.dll
            ./ResoniteBetterIMESupport.Engine/bin/Release/net10.0/*.dll
            ./build/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
