name: Build

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Collect build info
        id: info
        shell: pwsh
        run: |
          $shaShort = git rev-parse --short HEAD
          "sha_short=$shaShort" >> $env:GITHUB_OUTPUT
          [xml]$props = Get-Content Directory.Build.props
          $version = $props.Project.PropertyGroup.Version
          "version=$version" >> $env:GITHUB_OUTPUT
          "Version found: $version"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Install Cake Tool
        run: dotnet tool restore
      - name: Build with Cake
        run: dotnet cake --target=Build --verbosity=normal
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ResoniteBetterIMESupport-${{ steps.info.outputs.version }}-${{ steps.info.outputs.sha_short }}
          path: |
            ./ResoniteBetterIMESupport.Renderer/bin/Release/net472/*.dll
            ./ResoniteBetterIMESupport.Engine/bin/Release/net10.0/*.dll
            ./build/*.zip
